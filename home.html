<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

  apiKey: "AIzaSyALWW2yra6_6Hxr-hWQdXXXF0DDMOShq3k",
  authDomain: "affroxxx.firebaseapp.com",
  projectId: "affroxxx",
  storageBucket: "affroxxx.firebasestorage.app",
  messagingSenderId: "201165572616",
  appId: "1:201165572616:web:bcd3d24fae7be3cdec9fbd"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* STATE */

let allVideos = [];

let selectedCategory = "all";
let selectedCountry = "all";

/* LOAD VIDEOS */

async function loadVideos(){

  const snap = await getDocs(collection(db,"videos"));

  allVideos = [];

  snap.forEach(doc => {

    allVideos.push({
      id: doc.id,
      ...doc.data()
    });

  });

  renderVideos(allVideos);

  buildMenus(allVideos);
}

/* BUILD FILTER MENUS */

function buildMenus(videos){

  const categoriesBar =
    document.getElementById("categoriesBar");

  const countriesBar =
    document.getElementById("countriesBar");

  categoriesBar.innerHTML =
    '<a href="#" data-filter="all">All Categories</a>';

  countriesBar.innerHTML =
    '<a href="#" data-country="all">All Countries</a>';

  const categories = [
    ...new Set(
      videos
      .map(v => v.category)
      .filter(Boolean)
    )
  ];

  const countries = [
    ...new Set(
      videos
      .map(v => v.country)
      .filter(Boolean)
    )
  ];

  categories.forEach(cat => {

    categoriesBar.innerHTML +=
      `<a href="#" data-filter="${cat}">
        ${cat}
      </a>`;

  });

  countries.forEach(country => {

    countriesBar.innerHTML +=
      `<a href="#" data-country="${country}">
        ${country}
      </a>`;

  });

  attachFilters();
}

/* FILTERS */

function attachFilters(){

  document.querySelectorAll("[data-filter]")
  .forEach(btn => {

    btn.onclick = e => {

      e.preventDefault();

      selectedCategory =
        btn.dataset.filter;

      applyFilters();
    };

  });

  document.querySelectorAll("[data-country]")
  .forEach(btn => {

    btn.onclick = e => {

      e.preventDefault();

      selectedCountry =
        btn.dataset.country;

      applyFilters();
    };

  });
}

function applyFilters(){

  let filtered = [...allVideos];

  if(selectedCategory !== "all"){

    filtered = filtered.filter(v =>
      (v.category || "").toLowerCase()
      === selectedCategory.toLowerCase()
    );

  }

  if(selectedCountry !== "all"){

    filtered = filtered.filter(v =>
      (v.country || "").toLowerCase()
      === selectedCountry.toLowerCase()
    );

  }

  renderVideos(filtered);
}

/* SEARCH */

document.getElementById("searchBtn")
.addEventListener("click", () => {

  const q =
    document.getElementById("searchInput")
    .value
    .toLowerCase();

  const filtered = allVideos.filter(v =>

    (v.title || "")
    .toLowerCase()
    .includes(q)

  );

  renderVideos(filtered);

});

/* RENDER */

function renderVideos(videos){

  const grid =
    document.getElementById("videoGrid");

  if(videos.length === 0){

    grid.innerHTML =
      '<div class="no-results">No videos found.</div>';

    return;
  }

  grid.innerHTML = "";

  videos.forEach(v => {

    grid.innerHTML += `

      <a href="/affroxxx/watch.html?id=${v.id}"
         class="video-card">

        <div class="thumbnail">

          <img src="${v.thumbnail || ''}"
               alt="${v.title || ''}">

          <div class="duration">
            ${v.duration || "00:00"}
          </div>

        </div>

        <div class="video-info">

          <div class="video-title">
            ${v.title || ""}
          </div>

          <div class="video-meta">

            ${v.views || 0} views

            •

            ${v.category || "General"}

            •

            ${v.country || ""}

          </div>

        </div>

      </a>

    `;
  });
}

/* START */

loadVideos();

</script>
