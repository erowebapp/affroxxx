<style>
*{
margin:0;
padding:0;
box-sizing:border-box;

}

body{
background:#0f0f0f;

header{
background:#000;
padding:15px;
display:flex;

.btn{

}

.container{
max-width:1400px;
margin:auto;
padding:15px;
}

.layout{
display:grid;
grid-template-columns:2.5fr 1fr;
gap:20px;
}

.player{
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    border-radius:10px;
    overflow:hidden;
}

.player iframe{
    width:100%;
    height:100%;
    border:none;
    display:block;
}
.title{
font-size:24px;
margin-top:15px;

}

.meta{
color:#aaa;
margin-top:8px;
}

.description{
background:#181818;
padding:15px;
border-radius:8px;
margin-top:15px;
line-height:1.6;
}
  html,
body{
    width:100%;
    overflow-x:hidden;
}

.ad-slot{
margin:15px 0;
padding:25px;
background:#1b1b1b;
border:1px dashed #444;
border-radius:8px;
text-align:center;
color:#888;
}

.comments{
margin-top:20px;
}

.comment{
background:#1a1a1a;
padding:10px;
border-radius:6px;
margin-bottom:8px;
}

.comment-user{
font-weight:bold;
margin-bottom:5px;
}

.comment-input{
width:100%;
padding:12px;
margin-top:10px;
background:#111;
border:1px solid #333;
color:white;
border-radius:5px;
}
.player iframe,
.player embed,
.player video{
    width:100% !important;
    height:100% !important;
    max-width:100% !important;
}
    .ad-slot{
    overflow:hidden;
    max-width:100%;
}
.sidebar{
position:sticky;
top:80px;
height:fit-content;
}

.related{
display:flex;
gap:10px;
margin-bottom:12px;
text-decoration:none;
color:white;
}

.related img{
width:140px;
border-radius:6px;
}

.related small{
color:#aaa;
}

@media(max-width:900px){

.layout{
grid-template-columns:1fr;
}

.sidebar{
position:static;
}

.related img{
width:120px;
}

.title{
font-size:20px;
}

}
    /* MOBILE WIDTH FIX */

html,
body{
    width:100%;
    max-width:100%;
    overflow-x:hidden !important;
}

.container{
    width:100%;
    max-width:100%;
    padding:10px;
    overflow:hidden;
}

.layout{
    width:100%;
    max-width:100%;
}

.player,
.player iframe,
.player embed,
.player video{
    width:100% !important;
    max-width:100% !important;
}

.player iframe{
    height:100% !important;
}

/* FORCE ALL ADS TO STAY INSIDE SCREEN */
.ad-slot{
    width:100%;
    max-width:100%;
    overflow:hidden;
    padding:10px;
}

.ad-slot iframe,
.ad-slot img,
.ad-slot ins,
.ad-slot div{
    max-width:100% !important;
}

/* FIX RELATED VIDEOS */
.related{
    width:100%;
    overflow:hidden;
}

.related img{
    width:120px;
    max-width:120px;
}

/* MOBILE */
@media(max-width:900px){

    .container{
        padding:8px;
    }

    .layout{
        display:block;
    }

    .sidebar{
        position:static;
        width:100%;
        margin-top:20px;
    }

    .player{
        width:100%;
        aspect-ratio:16/9;
    }

    .btn{
        padding:10px;
        font-size:14px;
    }

</style>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
updateDoc,
increment,
collection,
getDocs,
addDoc,
query,
where,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyALWW2yra6_6Hxr-hWQdXXXF0DDMOShq3k",
  authDomain: "affroxxx.firebaseapp.com",
  projectId: "affroxxx",
  storageBucket: "affroxxx.firebasestorage.app",
  messagingSenderId: "201165572616",
  appId: "1:201165572616:web:bcd3d24fae7be3cdec9fbd",
  measurementId: "G-PBDB62DXBT"
};
const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

const videoId =
new URLSearchParams(location.search)
.get("id");

let currentUser = null;

window.joinWA = function(){

window.open(
"https://chat.whatsapp.com/EnTu7Uj8aezAiaCsNs2tYd",
"_blank"
);

};
window.openLive = function(){
    location.href="/affroxxx/live.html";
};

onAuthStateChanged(auth,(user)=>{
    currentUser = user;
});
async function loadVideo(){

if(!videoId){

document.getElementById("videoTitle")
.innerText = "Missing Video ID";

return;

}

const ref =
doc(db,"videos",videoId);

const snap =
await getDoc(ref);
console.log("Video ID:", videoId);
console.log("Exists:", snap.exists());

if(snap.exists()){
  console.log("Video Data:", snap.data());
}
if(!snap.exists()){

document.getElementById("videoTitle")
.innerText = "Video Not Found";

return;

}

const video = snap.data();

document.title =
video.title || "Video";

document.getElementById("videoTitle")
.innerText =
video.title || "";

document.getElementById("videoDescription")
.innerText =
video.description || "";

document.getElementById("videoMeta")
.innerText =
`${video.views || 0} views`;

const container = document.getElementById("playerContainer");

if(video.embed_url?.includes("<iframe")){
container.innerHTML = video.embed_url
.replace(/width="[^"]*"/gi,'')
.replace(/height="[^"]*"/gi,'')
.replace(/style="[^"]*"/gi,'');
}else{
    container.innerHTML =
    `<iframe src="${video.embed_url}" allowfullscreen></iframe>`;
}

await updateDoc(ref,{
views: increment(1)
});

loadComments();
loadRelated(video);

}

async function loadComments(){

const commentsBox =
document.getElementById("commentsBox");

commentsBox.innerHTML = "";

const q = query(
collection(db,"comments"),
where("videoId","==",videoId)
);

const snap =
await getDocs(q);

snap.forEach(docSnap=>{

const c = docSnap.data();

commentsBox.innerHTML += `
<div class="comment">
<div class="comment-user">
${c.userName || "User"}
</div>
<div>
${c.text}
</div>
</div>
`;

});

}

window.postComment =
async function(){

if(!currentUser){

const provider =
new GoogleAuthProvider();

await signInWithPopup(
auth,
provider
);

return;

}

const text =
document.getElementById("commentInput")
.value.trim();

if(!text) return;

await addDoc(
collection(db,"comments"),
{
videoId,
text,
userName:
currentUser.displayName,
createdAt:
serverTimestamp()
}
);

document.getElementById("commentInput")
.value = "";

loadComments();

};
window.downloadVideo = function(){

alert(
"Downloads are not available for this video."
);

};
  window.closeDownloadPopup = function(){

document.getElementById("downloadPopup")
.style.display = "none";

};
async function loadRelated(video){

const box =
document.getElementById("relatedVideos");

box.innerHTML = "";

const snap =
await getDocs(collection(db,"videos"));

const currentTags =
video.tags || [];

let related = [];

snap.forEach(d=>{

if(d.id === videoId)
return;

const v = d.data();

let score = 0;

if(v.category === video.category)
score += 3;

if(v.country === video.country)
score += 3;

(v.tags || []).forEach(tag=>{

if(currentTags.includes(tag))
score += 2;

});

related.push({
id:d.id,
score,
...v
});

});

related.sort(
(a,b)=>b.score-a.score
);

related.slice(0,8)
.forEach(v=>{

box.innerHTML += `
<a
href="/affroxxx/watch.html?id=${v.id}"
class="related">

<img src="${v.thumbnail}">

<div>

<div>${v.title}</div>

<small>
${v.views || 0} views
</small>

</div>

</a>
`;

});

}

loadVideo();
window.shareVideo = function(){

    const url = encodeURIComponent(window.location.href);
    const title = encodeURIComponent(document.title);

    document.getElementById("shareModal").style.display = "flex";

    document.getElementById("shareWhatsapp").href =
        `https://wa.me/?text=${title}%20${url}`;

    document.getElementById("shareFacebook").href =
        `https://www.facebook.com/sharer/sharer.php?u=${url}`;

    document.getElementById("shareX").href =
        `https://twitter.com/intent/tweet?url=${url}&text=${title}`;

    document.getElementById("shareTelegram").href =
        `https://t.me/share/url?url=${url}&text=${title}`;

};
</script>
