<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFFROXXX</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    text-align:center;
}

.logo{
    font-size:70px;
    font-weight:900;
    letter-spacing:6px;
    text-transform:uppercase;
    animation: glow 2s infinite alternate;
}

.tagline{
    margin-top:15px;
    font-size:18px;
    color:#ccc;
    opacity:0;
    animation: fadeIn 1.5s forwards;
    animation-delay:1s;
}

.loader{
    width:220px;
    height:5px;
    background:#222;
    margin:40px auto 0;
    border-radius:20px;
    overflow:hidden;
}

.loader span{
    display:block;
    width:0%;
    height:100%;
    background:#fff;
    animation: loading 4s linear forwards;
}

.pulse{
    position:absolute;
    width:300px;
    height:300px;
    border:2px solid rgba(255,255,255,0.08);
    border-radius:50%;
    animation:pulse 3s infinite;
}

.pulse:nth-child(2){
    animation-delay:1s;
}

.pulse:nth-child(3){
    animation-delay:2s;
}

@keyframes glow{
    from{
        text-shadow:
        0 0 10px rgba(255,255,255,.4),
        0 0 20px rgba(255,255,255,.3);
    }
    to{
        text-shadow:
        0 0 20px rgba(255,255,255,.8),
        0 0 40px rgba(255,255,255,.5);
    }
}

@keyframes fadeIn{
    to{
        opacity:1;
    }
}

@keyframes loading{
    to{
        width:100%;
    }
}

@keyframes pulse{
    0%{
        transform:scale(.5);
        opacity:1;
    }
    100%{
        transform:scale(2);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="pulse"></div>
<div class="pulse"></div>
<div class="pulse"></div>

<div class="container">

<div class="logo">
AFFROXXX
</div>

<div class="tagline">
Loading...
</div>

<div class="loader">
<span></span>
</div>

</div>

<script>
setTimeout(() => {
    window.location.href = "home.html";
}, 4000);
</script>

</body>
</html>
